<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Nearby Commons Image Hunt Accuracy v5</title>
  <style>
    :root {
      --black: #000;
      --white: #fff;
      --arrowRotation: 0deg;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      background: var(--black);
      color: var(--white);
      font-family: Arial, Helvetica, sans-serif;
    }

    button, a { font: inherit; }

    a {
      color: var(--white);
      text-decoration: none;
      border-bottom: 1px solid var(--white);
    }

    .stage {
      position: fixed;
      inset: 0;
      background: var(--black);
    }

    .image-frame {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: var(--black);
      overflow: hidden;
    }

    .target-image {
      display: block;
      width: auto;
      height: auto;
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      object-position: center;
      background: var(--black);
      opacity: 0;
      transition: opacity 150ms linear;
    }

    .target-image.is-ready { opacity: 1; }

    .arrow-wrap {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(24vmin, 150px);
      height: min(24vmin, 150px);
      transform: translate(-50%, -50%);
      pointer-events: none;
      display: grid;
      place-items: center;
      opacity: 0.9;
      z-index: 4;
    }

    .arrow {
      width: 100%;
      height: 100%;
      transform: rotate(var(--arrowRotation));
      transition: transform 100ms linear, opacity 180ms ease;
    }

    .arrow svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .no-heading .arrow { opacity: 0.35; }

    .top-left, .top-right, .bottom-left, .bottom-right, .status {
      position: absolute;
      z-index: 5;
    }

    .top-left {
      top: max(10px, env(safe-area-inset-top));
      left: max(10px, env(safe-area-inset-left));
    }

    .top-right {
      top: max(10px, env(safe-area-inset-top));
      right: max(10px, env(safe-area-inset-right));
      text-align: right;
      max-width: min(52vw, 380px);
    }

    .bottom-left {
      left: max(10px, env(safe-area-inset-left));
      bottom: max(10px, env(safe-area-inset-bottom));
      width: min(760px, calc(100vw - 20px));
    }

    .bottom-right {
      right: max(10px, env(safe-area-inset-right));
      bottom: max(10px, env(safe-area-inset-bottom));
    }

    .chip, .panel, .next-button, .permission-button, .status {
      background: var(--black);
      color: var(--white);
      border: 1px solid var(--white);
      box-shadow: none;
      backdrop-filter: none;
    }

    .chip {
      min-height: 34px;
      padding: 6px 8px;
      font-size: 12px;
      line-height: 1.3;
      text-transform: uppercase;
    }

    .chip strong {
      display: block;
      font-size: 24px;
      line-height: 1;
      font-weight: 700;
    }

    .readout {
      min-width: min(260px, 52vw);
      padding: 7px 8px;
      display: grid;
      gap: 2px;
      font-size: 12px;
      line-height: 1.3;
      text-transform: uppercase;
    }

    .readout b {
      font-size: 16px;
      font-weight: 700;
    }

    .panel {
      padding: 8px;
      display: grid;
      gap: 4px;
    }

    .title {
      max-width: 68ch;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 10px;
      font-size: 11px;
      line-height: 1.35;
      text-transform: uppercase;
    }

    .next-button, .permission-button {
      padding: 9px 11px;
      cursor: pointer;
      border-radius: 0;
      font-size: 12px;
      text-transform: uppercase;
    }

    .next-button:disabled { opacity: 0.45; cursor: wait; }

    .permission-wrap {
      position: absolute;
      left: 50%;
      bottom: max(72px, calc(env(safe-area-inset-bottom) + 72px));
      transform: translateX(-50%);
      z-index: 8;
      display: none;
    }

    .permission-wrap.is-visible { display: block; }

    .status {
      left: 50%;
      top: max(10px, env(safe-area-inset-top));
      transform: translateX(-50%);
      width: min(560px, calc(100vw - 20px));
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.35;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    .status.is-visible { opacity: 1; }

    .reward {
      position: absolute;
      z-index: 12;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 12px 14px;
      background: var(--white);
      color: var(--black);
      border: 1px solid var(--black);
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      opacity: 0;
      pointer-events: none;
    }

    .reward.is-visible { animation: rewardPop 1200ms linear both; }

    @keyframes rewardPop {
      0% { opacity: 0; }
      10% { opacity: 1; }
      75% { opacity: 1; }
      100% { opacity: 0; }
    }

    .empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      text-align: center;
      color: var(--white);
      font-size: 13px;
      line-height: 1.5;
      background: var(--black);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
      z-index: 3;
    }

    .empty.is-visible { opacity: 1; }

    @media (max-width: 720px) {
      .top-right {
        top: auto;
        right: auto;
        left: max(10px, env(safe-area-inset-left));
        bottom: max(84px, calc(env(safe-area-inset-bottom) + 84px));
        max-width: calc(100vw - 20px);
        text-align: left;
      }

      .readout { width: min(280px, calc(100vw - 20px)); }
      .bottom-left { width: calc(100vw - 92px); }
      .title { max-width: calc(100vw - 120px); }
      .meta span.optional { display: none; }
      .arrow-wrap { width: min(30vmin, 140px); height: min(30vmin, 140px); }
    }
  </style>
</head>
<body>
  <main class="stage no-heading" id="stage">
    <div class="image-frame">
      <img class="target-image" id="targetImage" alt="Nearest geotagged Wikimedia Commons target" />
      <div class="empty is-visible" id="emptyState">Waiting for live GPS permission.</div>
    </div>

    <div class="arrow-wrap" aria-hidden="true">
      <div class="arrow" id="arrow">
        <svg viewBox="0 0 100 100" role="img" aria-label="Direction arrow">
          <path d="M50 4 L78 58 L58 52 L58 94 L42 94 L42 52 L22 58 Z" fill="#fff" stroke="#000" stroke-width="4" stroke-linejoin="miter" />
        </svg>
      </div>
    </div>

    <div class="top-left">
      <div class="chip"><span>points</span><strong id="pointsValue">0</strong></div>
    </div>

    <div class="top-right">
      <div class="chip readout">
        <span id="distanceValue">waiting for GPS</span>
        <b id="directionValue">—</b>
        <span id="headingValue">accuracy pending</span>
      </div>
    </div>

    <div class="bottom-left">
      <section class="panel" aria-live="polite">
        <div class="title" id="imageTitle">Nearby Commons Image Hunt</div>
        <div class="meta">
          <span id="sourceValue">Wikimedia Commons</span>
          <span id="creditValue" class="optional">live GPS</span>
          <span id="licenseValue" class="optional">waiting for better fix</span>
          <a id="pageLink" href="https://commons.wikimedia.org/" target="_blank" rel="noreferrer">open file</a>
        </div>
      </section>
    </div>

    <div class="bottom-right">
      <button class="next-button" id="nextButton" type="button" disabled>next</button>
    </div>

    <div class="permission-wrap" id="permissionWrap">
      <button class="permission-button" id="permissionButton" type="button">enable live arrow</button>
    </div>

    <div class="status is-visible" id="statusText">Allow precise location, then wait outside for GPS to improve.</div>
    <div class="reward" id="rewardText">+1 point</div>
  </main>

  <script>
    const COMMONS_API = "https://commons.wikimedia.org/w/api.php";
    const SEARCH_RADIUS_METRES = 10000;
    const REFETCH_DISTANCE_METRES = 40;
    const MIN_FETCH_INTERVAL_MS = 8000;
    const TARGET_ACCURACY_METRES = 15;
    const POINT_ACCURACY_METRES = 25;
    const MAX_RESULTS = 100;
    const POINT_KEY = "commonsImageHunt.points.v1";
    const CLAIMED_KEY = "commonsImageHunt.claimedIds.v1";

    const elements = {
      stage: document.getElementById("stage"),
      targetImage: document.getElementById("targetImage"),
      emptyState: document.getElementById("emptyState"),
      pointsValue: document.getElementById("pointsValue"),
      distanceValue: document.getElementById("distanceValue"),
      directionValue: document.getElementById("directionValue"),
      headingValue: document.getElementById("headingValue"),
      imageTitle: document.getElementById("imageTitle"),
      sourceValue: document.getElementById("sourceValue"),
      creditValue: document.getElementById("creditValue"),
      licenseValue: document.getElementById("licenseValue"),
      pageLink: document.getElementById("pageLink"),
      nextButton: document.getElementById("nextButton"),
      permissionWrap: document.getElementById("permissionWrap"),
      permissionButton: document.getElementById("permissionButton"),
      statusText: document.getElementById("statusText"),
      rewardText: document.getElementById("rewardText")
    };

    const state = {
      user: null,
      searchCentre: null,
      searchCentreAccuracy: Infinity,
      images: [],
      currentId: null,
      heading: null,
      headingSource: "none",
      fetching: false,
      points: readNumber(POINT_KEY, 0),
      claimedIds: readSet(CLAIMED_KEY),
      rewardLockUntil: 0,
      statusTimer: null,
      autoFollow: true,
      lastFetchAt: 0,
      lastLocationAt: 0,
      bestAccuracy: Infinity,
      watchId: null,
      wakeLock: null
    };

    init();

    function init() {
      elements.pointsValue.textContent = String(state.points);
      elements.nextButton.addEventListener("click", selectNextFurthest);
      elements.permissionButton.addEventListener("click", requestOrientationPermission);
      elements.targetImage.addEventListener("load", () => {
        elements.targetImage.classList.add("is-ready");
      });
      document.addEventListener("visibilitychange", handleVisibilityChange);
      setupOrientation();
      startLiveLocation();
      requestWakeLock();
      window.setInterval(updateCurrentTargetDisplay, 1000);
    }

    function startLiveLocation() {
      if (!("geolocation" in navigator)) {
        showEmpty("This browser does not support geolocation.");
        return;
      }

      const liveGpsOptions = {
        enableHighAccuracy: true,
        maximumAge: 0
      };

      state.watchId = navigator.geolocation.watchPosition(
        handlePosition,
        handleLocationError,
        liveGpsOptions
      );

      navigator.geolocation.getCurrentPosition(
        handlePosition,
        handleInitialLocationError,
        {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 60000
        }
      );

      showStatus("Starting high-accuracy GPS. Accuracy usually improves after the phone has a clear sky view.", 6000);
    }

    function handlePosition(position) {
      const coords = position.coords;
      const now = Date.now();

      state.user = {
        lat: coords.latitude,
        lon: coords.longitude,
        accuracy: coords.accuracy || 999,
        speed: coords.speed,
        movementHeading: coords.heading
      };

      state.lastLocationAt = now;
      state.bestAccuracy = Math.min(state.bestAccuracy, state.user.accuracy);

      if (state.heading === null && typeof coords.heading === "number" && coords.speed > 0.8) {
        state.heading = normaliseDegrees(coords.heading);
        state.headingSource = "movement";
        elements.stage.classList.remove("no-heading");
      }

      updateImageDistances();

      const movedFarEnough = !state.searchCentre || distanceBetween(state.user, state.searchCentre) > REFETCH_DISTANCE_METRES;
      const accuracyImproved = state.user.accuracy < state.searchCentreAccuracy * 0.7;
      const waitedLongEnough = (now - state.lastFetchAt) > MIN_FETCH_INTERVAL_MS;

      if ((movedFarEnough || accuracyImproved || state.images.length === 0) && waitedLongEnough && !state.fetching) {
        fetchNearbyCommonsImages(state.user.lat, state.user.lon, state.user.accuracy);
      }

      hideEmpty();
      updateCurrentTargetDisplay();
      checkReachedTarget();
    }

    function handleInitialLocationError(error) {
      if (!state.user) {
        showStatus("Still waiting for GPS. Try going outside and keep the screen awake.", 6000);
      }
    }

    function handleLocationError(error) {
      if (state.user) {
        showStatus("GPS is still running, but the browser reported a temporary location error.", 3200);
        return;
      }

      let message = "Location permission is needed for live image hunting.";
      if (error.code === error.POSITION_UNAVAILABLE) {
        message = "The browser could not get a GPS position.";
      }
      if (error.code === error.TIMEOUT) {
        message = "GPS is taking too long. Go outside and keep the page open.";
      }
      showEmpty(message);
      showStatus(message, 6000);
    }

    async function requestWakeLock() {
      if (!("wakeLock" in navigator)) {
        return;
      }

      try {
        state.wakeLock = await navigator.wakeLock.request("screen");
      } catch (error) {
        state.wakeLock = null;
      }
    }

    function handleVisibilityChange() {
      if (document.visibilityState === "visible") {
        requestWakeLock();
        updateCurrentTargetDisplay();
      }
    }

    function setupOrientation() {
      if (!("DeviceOrientationEvent" in window)) {
        setHeadingNotice("no heading");
        return;
      }

      if (typeof DeviceOrientationEvent.requestPermission === "function") {
        elements.permissionWrap.classList.add("is-visible");
        setHeadingNotice("tap arrow permission");
        return;
      }

      startOrientationListeners();
    }

    async function requestOrientationPermission() {
      try {
        const result = await DeviceOrientationEvent.requestPermission();
        if (result === "granted") {
          elements.permissionWrap.classList.remove("is-visible");
          startOrientationListeners();
          showStatus("Live facing direction enabled.", 2600);
        } else {
          setHeadingNotice("heading denied");
          showStatus("Direction permission was not granted.", 3600);
        }
      } catch (error) {
        setHeadingNotice("heading blocked");
        showStatus("The browser blocked device heading access. Use HTTPS on a phone.", 4200);
      }
    }

    function startOrientationListeners() {
      window.addEventListener("deviceorientationabsolute", handleOrientation, true);
      window.addEventListener("deviceorientation", handleOrientation, true);
      setHeadingNotice("finding heading");
    }

    function handleOrientation(event) {
      let heading = null;
      let source = "device";

      if (typeof event.webkitCompassHeading === "number") {
        heading = event.webkitCompassHeading;
        source = "compass";
      } else if (typeof event.alpha === "number") {
        const screenAngle = getScreenAngle();
        heading = (360 - event.alpha + screenAngle + 360) % 360;
        source = event.absolute ? "absolute" : "approx";
      }

      if (heading === null || Number.isNaN(heading)) {
        return;
      }

      state.heading = normaliseDegrees(heading);
      state.headingSource = source;
      elements.stage.classList.remove("no-heading");
      updateCurrentTargetDisplay();
    }

    async function fetchNearbyCommonsImages(lat, lon, accuracy) {
      state.fetching = true;
      state.searchCentre = { lat, lon };
      state.searchCentreAccuracy = accuracy || Infinity;
      state.lastFetchAt = Date.now();
      elements.nextButton.disabled = true;
      showStatus("Scanning geotagged Wikimedia Commons images nearby.", 1800);

      try {
        const url = new URL(COMMONS_API);
        url.searchParams.set("origin", "*");
        url.searchParams.set("action", "query");
        url.searchParams.set("format", "json");
        url.searchParams.set("generator", "geosearch");
        url.searchParams.set("ggscoord", `${lat}|${lon}`);
        url.searchParams.set("ggsradius", String(SEARCH_RADIUS_METRES));
        url.searchParams.set("ggslimit", String(MAX_RESULTS));
        url.searchParams.set("ggsnamespace", "6");
        url.searchParams.set("ggsprimary", "all");
        url.searchParams.set("prop", "imageinfo|coordinates");
        url.searchParams.set("iiprop", "url|mime|size|extmetadata");
        url.searchParams.set("iiurlwidth", "2200");

        const response = await fetch(url.toString());
        if (!response.ok) {
          throw new Error(`Commons API returned ${response.status}`);
        }

        const data = await response.json();
        const pages = Object.values(data.query?.pages || {});
        const normalised = pages.map(normaliseCommonsPage).filter(Boolean);

        state.images = mergeImages(state.images, normalised);
        updateImageDistances();

        if (state.images.length === 0) {
          showEmpty("No geotagged Commons image found within 10 km.");
          showStatus("No geotagged Commons image found within 10 km.", 5000);
          return;
        }

        hideEmpty();

        if (state.autoFollow || !state.currentId || !state.images.some(image => image.id === state.currentId)) {
          const nextTarget = findFirstUnclaimed() || state.images[0];
          state.currentId = nextTarget.id;
        }

        elements.nextButton.disabled = state.images.length < 2;
        updateCurrentTargetDisplay(true);
      } catch (error) {
        showStatus("Commons image search failed. Check connection and try again.", 5000);
        if (state.images.length === 0) {
          showEmpty("Commons image search failed.");
        }
      } finally {
        state.fetching = false;
        elements.nextButton.disabled = state.images.length < 2;
      }
    }

    function normaliseCommonsPage(page) {
      const imageInfo = page.imageinfo?.[0];
      const coords = page.coordinates?.[0];
      if (!imageInfo || !coords) {
        return null;
      }
      if (!imageInfo.mime || !imageInfo.mime.startsWith("image/")) {
        return null;
      }

      const metadata = imageInfo.extmetadata || {};
      const title = cleanTitle(page.title);
      const creator = htmlToText(metadata.Artist?.value || metadata.Credit?.value || "Unknown creator");
      const license = htmlToText(metadata.LicenseShortName?.value || metadata.UsageTerms?.value || "Licence listed on Commons");
      const pageUrl = imageInfo.descriptionurl || `https://commons.wikimedia.org/wiki/${encodeURIComponent(page.title.replace(/ /g, "_"))}`;

      return {
        id: String(page.pageid),
        title,
        lat: Number(coords.lat),
        lon: Number(coords.lon),
        imageUrl: imageInfo.thumburl || imageInfo.url,
        pageUrl,
        creator,
        license,
        source: "Wikimedia Commons",
        distance: Infinity,
        bearing: 0
      };
    }

    function mergeImages(existing, incoming) {
      const byId = new Map(existing.map(image => [image.id, image]));
      incoming.forEach(image => byId.set(image.id, { ...byId.get(image.id), ...image }));
      return Array.from(byId.values());
    }

    function updateImageDistances() {
      if (!state.user) {
        return;
      }

      state.images.forEach(image => {
        image.distance = distanceBetween(state.user, image);
        image.bearing = bearingBetween(state.user.lat, state.user.lon, image.lat, image.lon);
      });

      state.images.sort((a, b) => a.distance - b.distance);
    }

    function updateCurrentTargetDisplay(forceImageReload = false) {
      if (!state.user) {
        return;
      }

      updateImageDistances();

      if (state.autoFollow) {
        const nearest = findFirstUnclaimed() || state.images[0] || null;
        if (nearest) {
          state.currentId = nearest.id;
        }
      }

      const target = getCurrentTarget();
      if (!target) {
        elements.distanceValue.textContent = "GPS active";
        elements.directionValue.textContent = "searching";
        elements.headingValue.textContent = getLocationLabel();
        return;
      }

      const reached = state.claimedIds.has(target.id);
      const relativeBearing = state.heading === null ? target.bearing : normaliseDegrees(target.bearing - state.heading);
      elements.stage.style.setProperty("--arrowRotation", `${relativeBearing}deg`);

      elements.distanceValue.textContent = `${formatDistance(target.distance)} away`;
      elements.directionValue.textContent = `${cardinalFromDegrees(target.bearing)} ${Math.round(target.bearing)}°`;
      elements.headingValue.textContent = getLocationLabel();
      elements.imageTitle.textContent = reached ? `${target.title} · claimed` : target.title;
      elements.sourceValue.textContent = `${target.source} ${state.images.findIndex(image => image.id === target.id) + 1}/${state.images.length}`;
      elements.creditValue.textContent = trimText(target.creator, 72);
      elements.licenseValue.textContent = target.license;
      elements.pageLink.href = target.pageUrl;

      if (forceImageReload || elements.targetImage.src !== target.imageUrl) {
        elements.targetImage.classList.remove("is-ready");
        elements.targetImage.src = target.imageUrl;
      }
    }

    function getCurrentTarget() {
      if (!state.currentId && state.images.length > 0) {
        state.currentId = state.images[0].id;
      }
      return state.images.find(image => image.id === state.currentId) || null;
    }

    function selectNextFurthest() {
      if (state.images.length < 2) {
        return;
      }

      state.autoFollow = false;
      updateImageDistances();
      const currentIndex = Math.max(0, state.images.findIndex(image => image.id === state.currentId));
      let nextIndex = (currentIndex + 1) % state.images.length;

      for (let attempts = 0; attempts < state.images.length; attempts += 1) {
        const candidate = state.images[nextIndex];
        if (!state.claimedIds.has(candidate.id) || attempts === state.images.length - 1) {
          state.currentId = candidate.id;
          updateCurrentTargetDisplay(true);
          return;
        }
        nextIndex = (nextIndex + 1) % state.images.length;
      }
    }

    function findFirstUnclaimed() {
      return state.images.find(image => !state.claimedIds.has(image.id)) || null;
    }

    function checkReachedTarget() {
      const target = getCurrentTarget();
      if (!target || state.claimedIds.has(target.id) || !state.user) {
        return;
      }

      const now = Date.now();
      if (now < state.rewardLockUntil) {
        return;
      }

      if (state.user.accuracy > POINT_ACCURACY_METRES) {
        return;
      }

      const threshold = clamp(state.user.accuracy * 1.25, 12, 35);
      if (target.distance > threshold) {
        return;
      }

      state.claimedIds.add(target.id);
      state.autoFollow = true;
      state.points += 1;
      state.rewardLockUntil = now + 5000;
      localStorage.setItem(POINT_KEY, String(state.points));
      localStorage.setItem(CLAIMED_KEY, JSON.stringify(Array.from(state.claimedIds)));
      elements.pointsValue.textContent = String(state.points);
      showReward();
      showStatus(`Target reached. GPS accuracy ${Math.round(state.user.accuracy)}m. +1 point.`, 2600);
      updateCurrentTargetDisplay();

      window.setTimeout(() => {
        const next = findFirstUnclaimed();
        if (next) {
          state.currentId = next.id;
          updateCurrentTargetDisplay(true);
        }
      }, 1600);
    }

    function getLocationLabel() {
      if (!state.user || !state.lastLocationAt) {
        return "GPS pending";
      }

      const age = Math.max(0, Math.round((Date.now() - state.lastLocationAt) / 1000));
      const accuracy = Math.round(state.user.accuracy);
      let quality = "poor";
      if (accuracy <= TARGET_ACCURACY_METRES) {
        quality = "good";
      } else if (accuracy <= POINT_ACCURACY_METRES) {
        quality = "usable";
      }

      const headingText = state.heading === null ? "" : ` · heading ${Math.round(state.heading)}°`;
      return `GPS ${quality} ±${accuracy}m · best ±${Math.round(state.bestAccuracy)}m · ${age}s${headingText}`;
    }

    function setHeadingNotice(text) {
      elements.headingValue.textContent = text;
    }

    function showStatus(message, duration = 3200) {
      elements.statusText.textContent = message;
      elements.statusText.classList.add("is-visible");
      window.clearTimeout(state.statusTimer);
      state.statusTimer = window.setTimeout(() => {
        elements.statusText.classList.remove("is-visible");
      }, duration);
    }

    function showReward() {
      elements.rewardText.classList.remove("is-visible");
      void elements.rewardText.offsetWidth;
      elements.rewardText.classList.add("is-visible");
    }

    function showEmpty(message) {
      elements.emptyState.textContent = message;
      elements.emptyState.classList.add("is-visible");
    }

    function hideEmpty() {
      elements.emptyState.classList.remove("is-visible");
    }

    function distanceBetween(a, b) {
      const earthRadius = 6371000;
      const lat1 = toRadians(a.lat);
      const lat2 = toRadians(b.lat);
      const deltaLat = toRadians(b.lat - a.lat);
      const deltaLon = toRadians(b.lon - a.lon);
      const sinLat = Math.sin(deltaLat / 2);
      const sinLon = Math.sin(deltaLon / 2);
      const h = sinLat * sinLat + Math.cos(lat1) * Math.cos(lat2) * sinLon * sinLon;
      return earthRadius * 2 * Math.atan2(Math.sqrt(h), Math.sqrt(1 - h));
    }

    function bearingBetween(lat1, lon1, lat2, lon2) {
      const startLat = toRadians(lat1);
      const endLat = toRadians(lat2);
      const deltaLon = toRadians(lon2 - lon1);
      const y = Math.sin(deltaLon) * Math.cos(endLat);
      const x = Math.cos(startLat) * Math.sin(endLat) - Math.sin(startLat) * Math.cos(endLat) * Math.cos(deltaLon);
      return normaliseDegrees(toDegrees(Math.atan2(y, x)));
    }

    function formatDistance(metres) {
      if (!Number.isFinite(metres)) {
        return "scanning";
      }
      if (metres < 1000) {
        return `${Math.round(metres)} m`;
      }
      return `${(metres / 1000).toFixed(2)} km`;
    }

    function cardinalFromDegrees(degrees) {
      const labels = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
      return labels[Math.round(normaliseDegrees(degrees) / 45) % 8];
    }

    function cleanTitle(title) {
      return String(title || "Untitled Commons image")
        .replace(/^File:/i, "")
        .replace(/_/g, " ")
        .replace(/\.(jpg|jpeg|png|gif|webp|tif|tiff|svg)$/i, "");
    }

    function htmlToText(html) {
      const container = document.createElement("div");
      container.innerHTML = String(html || "");
      return container.textContent.trim().replace(/\s+/g, " ") || "Unknown";
    }

    function trimText(text, maxLength) {
      const clean = String(text || "Unknown").replace(/\s+/g, " ").trim();
      if (clean.length <= maxLength) {
        return clean;
      }
      return `${clean.slice(0, maxLength - 1)}…`;
    }

    function normaliseDegrees(degrees) {
      return ((degrees % 360) + 360) % 360;
    }

    function toRadians(degrees) {
      return degrees * Math.PI / 180;
    }

    function toDegrees(radians) {
      return radians * 180 / Math.PI;
    }

    function getScreenAngle() {
      if (screen.orientation && typeof screen.orientation.angle === "number") {
        return screen.orientation.angle;
      }
      if (typeof window.orientation === "number") {
        return window.orientation;
      }
      return 0;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function readNumber(key, fallback) {
      const value = Number(localStorage.getItem(key));
      return Number.isFinite(value) ? value : fallback;
    }

    function readSet(key) {
      try {
        return new Set(JSON.parse(localStorage.getItem(key) || "[]"));
      } catch (error) {
        return new Set();
      }
    }
  </script>
</body>
